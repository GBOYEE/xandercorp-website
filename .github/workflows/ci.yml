name: CI
'on':
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
      - name: Lint (flake8)
        run: |
          pip install flake8 2>/dev/null || true
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
      - name: Security scan (bandit)
        run: |
          pip install bandit 2>/dev/null || true
          bandit -r . -f json -o /tmp/bandit-result.json || true
          cat /tmp/bandit-result.json || true
      - name: Unit tests (pytest)
        run: |
          pip install pytest pytest-cov 2>/dev/null || true
          pytest --cov=. --cov-report=xml || true
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml || true
      - name: SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin 2>/dev/null || true
          syft dir:. -o spdx-json=/tmp/spdx.json || true
